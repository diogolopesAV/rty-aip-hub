name: rty-aip-hub
version: 1.0.0
description: "Riverty AI Package Hub — curated skills and AI capabilities for the Riverty platform"
license: MIT
# targets: needed for CI — microsoft/apm-action@v1 auto-runs apm install on a
# clean runner with no harness markers. Does NOT affect remote consumers; they
# must pass --target <harness> in fresh directories.
targets:
  - claude
  - cursor
  - codex
  - copilot

marketplace:
  name: rty-hub
  owner:
    name: Riverty Technology Innovation
    url: https://github.com/Riverty-Tech-Innovation

  packages:
    # Riverty-owned — maintained in this repo under packages/
    - name: rty-atlassian-mcp
      source: ./packages/rty-atlassian-mcp
      description: "Configure Atlassian's cloud MCP server for Jira and Confluence access in AI agents"
      tags: [skill, ai, confluence, jira, mcp]
    - name: rty-skill-authoring
      source: ./packages/rty-skill-authoring
      description: "Create, review, and refine agent skills following Riverty conventions and the agentskills.io specification"
      tags: [skill, ai, workflow]
    - name: rty-web-accessibility
      source: ./packages/rty-web-accessibility
      description: "Ensure generated HTML/CSS is WCAG 2.1/2.2 Level AA compliant using Riverty web components"
      tags: [skill, design-system, accessibility, html, css]
    - name: rty-terraform-azure-cdn-classic-migration
      source: ./packages/rty-terraform-azure-cdn-classic-migration
      description: "Guide Azure CDN Classic to Azure Front Door migration for Terraform-managed environments"
      tags: [skill, azure, terraform, migration]
    # External — maintained in separate Riverty repos (private: requires GITHUB_APM_PAT)
    - name: bip-python-skill
      source: Riverty-Tech-Innovation/bip-python-skill
      ref: a54a2102db113824db71cccf1241cdae62d2ebdb
      description: "Python coding practices for maintainable, secure, and scalable code following BIP standards"
      tags: [skill, bip, python]
    - name: bip-terraform-skill
      source: Riverty-Tech-Innovation/bip-terraform-skill
      ref: 89fe35c95bcf9adffa1a1d03118f9cfa7285924f
      description: "Terraform coding practices for maintainable, secure IaC following BIP standards"
      tags: [skill, bip, terraform, iac]

# Full platform baseline: apm install diogolopesAV/rty-aip-hub installs all packages.
dependencies:
  apm:
    - diogolopesAV/rty-aip-hub/packages/rty-atlassian-mcp
    - diogolopesAV/rty-aip-hub/packages/rty-skill-authoring
    - diogolopesAV/rty-aip-hub/packages/rty-web-accessibility
    - diogolopesAV/rty-aip-hub/packages/rty-terraform-azure-cdn-classic-migration
    - Riverty-Tech-Innovation/bip-python-skill#a54a2102db113824db71cccf1241cdae62d2ebdb
    - Riverty-Tech-Innovation/bip-terraform-skill#89fe35c95bcf9adffa1a1d03118f9cfa7285924f
